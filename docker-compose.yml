services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:15-alpine
    container_name: productdb-postgres
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
      POSTGRES_USER: productdb_user
      POSTGRES_PASSWORD: productdb_password
      POSTGRES_DB: productdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productdb_user -d productdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker.m.daocloud.io/library/productdb-api:latest
    container_name: productdb-api
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
      DATABASE_URL: postgresql://productdb_user:productdb_password@postgres:5432/productdb
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./web
      dockerfile: ../Dockerfile.web
    image: docker.m.daocloud.io/library/productdb-web:latest
    container_name: productdb-web
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: "*"
    ports:
      - "3001:80"
    depends_on:
      - api
    volumes:
      - ./web:/app

volumes:
  postgres_data:
